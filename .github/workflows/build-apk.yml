name: Build Android APK

# Builds a release APK in the cloud — no local Flutter/Android toolchain needed.
# Trigger: every push to main, or manually via the Actions tab ("Run workflow").
# Download: Actions run → Artifacts → "atomy-receiver-admin-apk".

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # The app uses Color.withValues() (Flutter 3.27+) and CardThemeData
      # (Flutter 3.29+), and its Gradle config (AGP 8.7.3 / Gradle 8.10.2 /
      # Kotlin 2.1.0) matches the Flutter 3.29 template — so pin 3.29.
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.29.0"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # The Gradle wrapper jar/scripts are not committed. The GitHub runner has
      # no global `gradle`, so we generate a throwaway Flutter project (Flutter
      # IS available here) and copy its wrapper files in. Our own
      # gradle-wrapper.properties (pinned to 8.10.2) is kept as-is.
      - name: Ensure Gradle wrapper
        run: |
          if [ ! -f android/gradlew ] || [ ! -f android/gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Gradle wrapper missing — generating from a temporary Flutter project"
            tmp="$(mktemp -d)"
            flutter create --platforms=android --project-name wrappersrc "$tmp/wrappersrc"
            mkdir -p android/gradle/wrapper
            cp "$tmp/wrappersrc/android/gradlew" android/gradlew
            cp "$tmp/wrappersrc/android/gradlew.bat" android/gradlew.bat 2>/dev/null || true
            cp "$tmp/wrappersrc/android/gradle/wrapper/gradle-wrapper.jar" android/gradle/wrapper/gradle-wrapper.jar
            chmod +x android/gradlew
            echo "Wrapper files installed."
          fi

      - name: Build release APK
        run: |
          set -o pipefail
          flutter build apk --release 2>&1 | tee /tmp/build.log

      # Runs even on failure — writes the compiler/build errors to the run's
      # Summary page (readable HTML), so failures can be diagnosed without
      # digging through the collapsed live-log viewer.
      - name: Publish build log to summary
        if: always()
        run: |
          {
            echo '## Dart / compile error lines';
            echo '```';
            grep -nE "Error:|\.dart:[0-9]|Target .* failed|FAILURE:|What went wrong|Exception|error:" /tmp/build.log | head -n 120 || echo "(no matching lines)";
            echo '```';
            echo '## Build log (last 160 lines)';
            echo '```';
            tail -n 160 /tmp/build.log 2>/dev/null || echo "(no log captured)";
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: atomy-receiver-admin-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-file-found: error
          retention-days: 30
